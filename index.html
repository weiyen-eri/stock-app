<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>我的個人助理</title>
    
    <!-- PWA 必要設定：讓網頁「加入主畫面」後像 App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="個人助手">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* 針對 iPhone 17 的安全區域設定 */
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #2d3436 100%);
            min-height: 100vh;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding-top: var(--safe-area-top);
            padding-bottom: var(--safe-area-bottom);
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .active-scale:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }
    </style>
</head>
<body class="flex flex-col items-center p-6">

    <!-- 頂部狀態列 -->
    <header class="w-full max-w-md flex justify-between items-center mb-8 mt-4">
        <div>
            <h1 class="text-2xl font-bold tracking-tight">個人助手</h1>
            <p class="text-sm text-gray-400" id="date-display">2026年4月20日</p>
        </div>
        <div class="w-12 h-12 glass flex items-center justify-center">
            <span class="text-xl">✨</span>
        </div>
    </header>

    <!-- 主要功能卡片 -->
    <main class="w-full max-w-md space-y-4">
        
        <!-- 動態訊息區 -->
        <section class="glass p-6 shadow-xl">
            <h2 class="text-sm font-semibold text-blue-400 uppercase tracking-wider mb-2">今日摘要</h2>
            <p class="text-lg leading-relaxed" id="greeting">正在載入您的 iPhone 17 個人資料...</p>
        </section>

        <!-- 快速功能按鈕網格 (響應式：手機2欄) -->
        <div class="grid grid-cols-2 gap-4">
            <button class="glass p-4 active-scale flex flex-col items-center space-y-2">
                <span class="text-2xl">📝</span>
                <span class="text-sm font-medium">快速筆記</span>
            </button>
            <button class="glass p-4 active-scale flex flex-col items-center space-y-2">
                <span class="text-2xl">📊</span>
                <span class="text-sm font-medium">數據分析</span>
            </button>
            <button class="glass p-4 active-scale flex flex-col items-center space-y-2">
                <span class="text-2xl">🏠</span>
                <span class="text-sm font-medium">智慧家居</span>
            </button>
            <button class="glass p-4 active-scale flex flex-col items-center space-y-2">
                <span class="text-2xl">⚙️</span>
                <span class="text-sm font-medium">設定</span>
            </button>
        </div>

        <!-- 底部控制區 -->
        <section class="glass p-6 mt-8">
            <div class="flex items-center space-x-3 bg-white/5 rounded-full px-4 py-2">
                <span class="text-blue-400">●</span>
                <input type="text" placeholder="輸入指令..." class="bg-transparent border-none outline-none flex-1 text-sm text-white placeholder-gray-500">
            </div>
        </section>
        
    </main>

    <footer class="mt-auto py-6 text-gray-500 text-xs">
        <p>優化於 iPhone 17 (2026) | 響應式佈局</p>
    </footer>

    <script>
        // 更新時間
        const updateDate = () => {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date-display').innerText = now.toLocaleDateString('zh-TW', options);
            
            const hours = now.getHours();
            let greet = "午安";
            if(hours < 12) greet = "早安";
            if(hours > 18) greet = "晚安";
            document.getElementById('greeting').innerText = `${greet}！今天有 3 項待辦事項需要處理。`;
        };

        updateDate();
    </script>
</body>
</html>
