<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- 
      版本: v1.2.0
      最後更新: 2026-04-21
      修改重點:
      1. UI 邏輯優化：新增「銀行關鍵字」自動辨識，動態調整輸入框提示。
      2. 視覺強化：針對台股習慣調整損益顏色 (正紅負綠)。
      3. 交互優化：送出資料後加入更直觀的震動反饋感（CSS 動畫）。
      4. 代碼結構整頓，為下一步「自動庫存計算」預留數據接口。
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>我的投資帳本 Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-blue: #0066cc;
            --bg-gray: #f2f4f7;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --stock-up: #eb4d4b; /* 台股紅 */
            --stock-down: #2ecc71; /* 台股綠 */
        }

        body {
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding-top: var(--safe-top);
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .tab-active {
            color: var(--primary-blue);
            border-bottom: 3px solid var(--primary-blue);
        }

        .btn-press:active {
            transform: scale(0.96);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }

        /* 銀行模式下的輸入框特效 */
        .input-bank-mode {
            background-color: #eef6ff !important;
            border-color: #0066cc !important;
        }

        /* 隱藏捲軸 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <!-- 頂部狀態欄裝飾 -->
    <div class="fixed top-0 w-full bg-[#0066cc] h-[var(--safe-top)] z-[60]"></div>

    <!-- Header -->
    <header class="bg-[#0066cc] text-white p-5 sticky top-[var(--safe-top)] z-50 flex justify-between items-center rounded-b-[30px] shadow-lg">
        <button onclick="fetchData()" class="w-10 h-10 flex items-center justify-center bg-white/20 rounded-full btn-press">
            <span id="refresh-icon">🔄</span>
        </button>
        <div class="text-center">
            <h1 class="text-sm opacity-80">我的總資產</h1>
            <p id="total-assets" class="text-2xl font-black tracking-tight">$ --</p>
        </div>
        <button onclick="toggleAddModal()" class="w-10 h-10 flex items-center justify-center bg-white rounded-full text-[#0066cc] shadow-lg btn-press">
            <span class="text-2xl font-bold">＋</span>
        </button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-5">
        
        <!-- 資產損益快報 -->
        <section class="glass-card p-6 grid grid-cols-2 gap-4 animate-in" id="summary-section">
            <div class="border-r border-gray-100">
                <p class="text-[11px] text-gray-400 uppercase font-bold tracking-wider">庫存市值</p>
                <p id="stock-market-value" class="text-lg font-bold text-gray-800">--</p>
            </div>
            <div>
                <p class="text-[11px] text-gray-400 uppercase font-bold tracking-wider">未實現損益</p>
                <p id="total-profit" class="text-lg font-bold">--</p>
            </div>
        </section>

        <!-- 銀行餘額 -->
        <section class="bg-gradient-to-br from-blue-600 to-blue-700 rounded-[24px] p-6 text-white shadow-blue-200 shadow-xl flex justify-between items-center animate-in" style="animation-delay: 0.1s">
            <div>
                <p class="text-xs opacity-70 font-medium">可用現金 (銀行)</p>
                <p id="bank-balance" class="text-2xl font-black mt-1">$ --</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] bg-white/20 px-2 py-1 rounded-md inline-block font-mono" id="sync-time">WAITING</p>
            </div>
        </section>

        <!-- Tab 導航 -->
        <div class="flex bg-white/50 p-1 rounded-2xl animate-in" style="animation-delay: 0.2s">
            <button onclick="switchTab('portfolio')" id="tab-portfolio" class="flex-1 py-3 text-sm font-black rounded-xl transition-all tab-active">資產配置</button>
            <button onclick="switchTab('transactions')" id="tab-transactions" class="flex-1 py-3 text-sm font-black rounded-xl transition-all text-gray-400">交易流水</button>
        </div>

        <!-- 內容區域 -->
        <div id="content-portfolio" class="space-y-3 animate-in" style="animation-delay: 0.3s">
            <div class="text-center py-20">
                <div class="inline-block animate-spin mb-4">⏳</div>
                <p class="text-gray-400 text-sm">正在整理您的資產數據...</p>
            </div>
        </div>

        <div id="content-transactions" class="hidden space-y-3 animate-in"></div>

    </main>

    <!-- 底部導覽欄 -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-100 px-8 py-4 flex justify-around items-center z-40" style="padding-bottom: calc(12px + var(--safe-bottom))">
        <button class="flex flex-col items-center text-blue-600">
            <span class="text-2xl">📊</span>
            <span class="text-[10px] font-bold mt-1">資產</span>
        </button>
        <button class="flex flex-col items-center text-gray-300 opacity-50">
            <span class="text-2xl">🔍</span>
            <span class="text-[10px] font-bold mt-1">分析</span>
        </button>
        <button class="flex flex-col items-center text-gray-300 opacity-50">
            <span class="text-2xl">👤</span>
            <span class="text-[10px] font-bold mt-1">設定</span>
        </button>
    </footer>

    <!-- 新增交易彈窗 -->
    <div id="addModal" class="fixed inset-0 bg-black/40 z-[100] hidden flex items-end justify-center backdrop-blur-sm transition-all">
        <div class="bg-white w-full max-w-md rounded-t-[40px] p-8 shadow-2xl transform translate-y-0">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black text-gray-800">新增紀錄</h2>
                <button onclick="toggleAddModal()" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full text-gray-400 font-bold">&times;</button>
            </div>
            
            <div class="space-y-6">
                <!-- 類型切換 -->
                <div class="flex gap-2 p-1.5 bg-gray-100 rounded-2xl">
                    <button id="type-buy" onclick="setType('買入')" class="flex-1 py-3 rounded-xl bg-white shadow-sm font-bold text-blue-600 transition-all">買入/存入</button>
                    <button id="type-sell" onclick="setType('賣出')" class="flex-1 py-3 rounded-xl font-bold text-gray-400 transition-all">賣出/提領</button>
                </div>

                <!-- 輸入欄位 -->
                <div class="space-y-4">
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 ml-2 mb-1 block">標的名稱或代號</label>
                        <input type="text" id="input-symbol" oninput="checkBankMode(this.value)" placeholder="例如: 2330 或 銀行存款" class="w-full bg-gray-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500 transition-all font-bold">
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label id="label-qty" class="text-[11px] font-bold text-gray-400 ml-2 mb-1 block">數量 (單位)</label>
                            <input type="number" id="input-qty" placeholder="1000" class="w-full bg-gray-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500 font-mono font-bold">
                        </div>
                        <div class="flex-1">
                            <label id="label-price" class="text-[11px] font-bold text-gray-400 ml-2 mb-1 block">單價 / 總金額</label>
                            <input type="number" id="input-price" placeholder="750" class="w-full bg-gray-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500 font-mono font-bold">
                        </div>
                    </div>
                </div>

                <button onclick="submitToSheet()" id="btn-submit" class="w-full bg-blue-600 text-white py-5 rounded-[20px] font-black shadow-xl shadow-blue-100 btn-press flex justify-center items-center gap-3">
                    <span id="submit-text">確認並儲存到雲端</span>
                </button>
                <div class="h-6"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwX_n3F8up4yUUAsZASvTOccLDAJCe5ZJWQKC0gUSlqnF2lIZhAlQe87dnotrzrStZl/exec";
        let currentType = "買入";

        window.onload = () => {
            fetchData();
        };

        async function fetchData() {
            const refreshIcon = document.getElementById('refresh-icon');
            refreshIcon.classList.add('animate-spin');
            
            try {
                const response = await fetch(`${API_URL}?t=${new Date().getTime()}`);
                const result = await response.json();
                if (result.status === "success") {
                    renderDashboard(result.data);
                    document.getElementById('sync-time').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }
            } catch (e) {
                console.error("Fetch Error:", e);
            } finally {
                setTimeout(() => refreshIcon.classList.remove('animate-spin'), 500);
            }
        }

        function renderDashboard(data) {
            const s = data.summary || {};
            const t = data.transactions || [];

            const bank = Number(s.BankBalance) || 0;
            const market = Number(s.StockMarketValue) || 0;
            const total = bank + market;
            document.getElementById('total-assets').innerText = `$ ${total.toLocaleString()}`;
            
            document.getElementById('stock-market-value').innerText = market.toLocaleString();
            
            const profit = Number(s.TotalProfit) || 0;
            const profitEl = document.getElementById('total-profit');
            profitEl.innerText = `${profit > 0 ? '+' : ''}${profit.toLocaleString()}`;
            // 台股配色：正數紅，負數綠
            profitEl.style.color = profit >= 0 ? 'var(--stock-up)' : 'var(--stock-down)';
            
            document.getElementById('bank-balance').innerText = `$ ${bank.toLocaleString()}`;

            const tContainer = document.getElementById('content-transactions');
            if (t.length > 0) {
                tContainer.innerHTML = t.reverse().map(item => {
                    const isOut = item[1].includes('賣') || item[1].includes('提');
                    return `
                    <div class="glass-card p-4 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center ${!isOut ? 'bg-blue-50 text-blue-600' : 'bg-red-50 text-red-600'} text-xs font-black">
                                ${item[1][0]}
                            </div>
                            <div>
                                <p class="text-[10px] text-gray-400 font-bold">${item[0].split(' ')[0]}</p>
                                <p class="font-black text-gray-800">${item[2]}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black ${isOut ? 'text-red-500' : 'text-gray-800'}">
                                ${Number(item[4]).toLocaleString()}
                            </p>
                            <p class="text-[10px] text-gray-400 font-bold">${item[3]} 單位</p>
                        </div>
                    </div>
                `}).join('');
            } else {
                tContainer.innerHTML = `<div class="text-center py-20 text-gray-400 text-sm">目前沒有交易紀錄</div>`;
            }

            const pContainer = document.getElementById('content-portfolio');
            const marketPct = Math.round(market/total*100) || 0;
            const bankPct = 100 - marketPct;
            
            pContainer.innerHTML = `
                <div class="glass-card p-5">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-black text-gray-800">資產占比</h3>
                        <span class="text-[10px] text-gray-400 font-bold">即時分析</span>
                    </div>
                    <div class="flex h-3 rounded-full overflow-hidden mb-6 bg-gray-100">
                        <div style="width: ${marketPct}%" class="bg-blue-600"></div>
                        <div style="width: ${bankPct}%" class="bg-blue-300"></div>
                    </div>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center text-sm">
                            <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-blue-600"></div><span class="font-bold text-gray-600">股票市值</span></div>
                            <span class="font-mono font-bold text-gray-800">${marketPct}%</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-blue-300"></div><span class="font-bold text-gray-600">現金存款</span></div>
                            <span class="font-mono font-bold text-gray-800">${bankPct}%</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function checkBankMode(val) {
            const bankKeywords = ['銀行', '存款', '現金', 'bank', 'cash'];
            const isBank = bankKeywords.some(k => val.includes(k));
            const inputSymbol = document.getElementById('input-symbol');
            const inputQty = document.getElementById('input-qty');
            
            if (isBank) {
                inputSymbol.classList.add('input-bank-mode');
                inputQty.value = 1;
                document.getElementById('label-qty').innerText = "數量 (預設 1)";
                document.getElementById('label-price').innerText = "存提總額";
            } else {
                inputSymbol.classList.remove('input-bank-mode');
                document.getElementById('label-qty').innerText = "數量 (單位)";
                document.getElementById('label-price').innerText = "成交單價";
            }
        }

        async function submitToSheet() {
            const btn = document.getElementById('btn-submit');
            const submitText = document.getElementById('submit-text');
            const symbol = document.getElementById('input-symbol').value;
            const qty = document.getElementById('input-qty').value;
            const price = document.getElementById('input-price').value;

            if (!symbol || !qty || !price) return;

            btn.disabled = true;
            submitText.innerText = "傳送中...";

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: currentType,
                        symbol: symbol,
                        quantity: qty,
                        price: price,
                        fee: 0
                    })
                });

                setTimeout(() => {
                    toggleAddModal();
                    fetchData();
                    btn.disabled = false;
                    submitText.innerText = "確認並儲存到雲端";
                    document.getElementById('input-symbol').value = "";
                    document.getElementById('input-qty').value = "";
                    document.getElementById('input-price').value = "";
                    document.getElementById('input-symbol').classList.remove('input-bank-mode');
                }, 1000);

            } catch (e) {
                btn.disabled = false;
                submitText.innerText = "出錯了，請重試";
            }
        }

        function toggleAddModal() {
            document.getElementById('addModal').classList.toggle('hidden');
        }

        function setType(type) {
            currentType = type;
            const isBuy = type === '買入';
            document.getElementById('type-buy').className = `flex-1 py-3 rounded-xl font-bold transition-all ${isBuy ? 'bg-white shadow-sm text-blue-600' : 'text-gray-400'}`;
            document.getElementById('type-sell').className = `flex-1 py-3 rounded-xl font-bold transition-all ${!isBuy ? 'bg-white shadow-sm text-red-600' : 'text-gray-400'}`;
        }

        function switchTab(tab) {
            const isPort = tab === 'portfolio';
            document.getElementById('content-portfolio').classList.toggle('hidden', !isPort);
            document.getElementById('content-transactions').classList.toggle('hidden', isPort);
            document.getElementById('tab-portfolio').className = `flex-1 py-3 text-sm font-black rounded-xl transition-all ${isPort ? 'tab-active' : 'text-gray-400'}`;
            document.getElementById('tab-transactions').className = `flex-1 py-3 text-sm font-black rounded-xl transition-all ${!isPort ? 'tab-active' : 'text-gray-400'}`;
        }
    </script>
</body>
</html>
